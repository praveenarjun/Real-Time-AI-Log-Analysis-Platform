name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-go:
    name: Lint Go Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m --out-format=colored-line-number

  test-go:
    name: Test Go Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Run Tests
        run: go test -v -coverprofile=coverage-go.out ./...
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage-go.out

  lint-python:
    name: Lint Python AI Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Linting Tools
        run: pip install ruff
      - name: Run Ruff
        run: ruff check python-ai-service/

  test-python:
    name: Test Python AI Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          cd python-ai-service
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run Tests
        run: |
          cd python-ai-service
          # Allow exit code 5 (no tests collected) to prevent CI failure
          pytest --cov=. --cov-report=xml:coverage-python.xml || { if [ $? -eq 5 ]; then exit 0; else exit 1; fi; }
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: python-ai-service/coverage-python.xml

  build-images:
    name: Build & Verify Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api-gateway/Dockerfile
          push: false
      - name: Build Collector
        uses: docker/build-push-action@v5
        with:
          context: .
          file: log-collector/Dockerfile
          push: false
      - name: Build AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./python-ai-service
          push: false

  integration-test:
    name: Integration Tests
    needs: [build-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Platform
        run: docker compose up -d
      - name: Wait for Infrastructure
        run: |
          echo "Waiting for Kafka, Loki, and Postgres to be healthy..."
          sleep 30
      - name: Run Smoke Test
        run: |
          # Try to connect, but show logs if it fails to speed up debugging
          if ! curl -s --retry 10 --retry-connrefused http://localhost:8080/health | grep -q 'UP'; then
            echo "❌ Smoke test failed! Capturing platform logs..."
            docker compose logs
            exit 1
          fi
          echo "✅ Platform is UP and healthy."
