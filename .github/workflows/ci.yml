name: Continuous Integration

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  lint-go:
    name: Lint Go Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: golangci-lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest
          args: --timeout=5m --out-format=colored-line-number
        continue-on-error: true

  test-go:
    name: Test Go Services
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.24'
          cache: true
      - name: Run Tests
        run: go test -v -coverprofile=coverage-go.out ./...
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: go-coverage
          path: coverage-go.out

  lint-python:
    name: Lint Python AI Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Linting Tools
        run: pip install ruff
      - name: Run Ruff
        run: ruff check python-ai-service/
        continue-on-error: true

  test-python:
    name: Test Python AI Service
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: |
          cd python-ai-service
          pip install -r requirements.txt
          pip install pytest pytest-cov
      - name: Run Tests
        run: |
          cd python-ai-service
          # Allow exit code 5 (no tests collected) to prevent CI failure
          pytest --cov=. --cov-report=xml:coverage-python.xml || { if [ $? -eq 5 ]; then exit 0; else exit 1; fi; }
      - name: Upload Coverage
        uses: actions/upload-artifact@v4
        with:
          name: python-coverage
          path: python-ai-service/coverage-python.xml

  build-images:
    name: Build & Verify Images
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3
      - name: Build Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api-gateway/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build Collector
        uses: docker/build-push-action@v5
        with:
          context: .
          file: log-collector/Dockerfile
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max
      - name: Build AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./python-ai-service
          push: false
          cache-from: type=gha
          cache-to: type=gha,mode=max

  integration-test:
    name: Integration Tests
    needs: [build-images]
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Start Platform
        run: docker compose up -d
      - name: Wait for Platform Health
        run: |
          echo "Waiting for Gateway to be Healthy (Process Start)..."
          NEXT_WAIT_TIME=0
          until [ "$(docker inspect --format='{{.State.Health.Status}}' $(docker compose ps -q go-gateway))" == "healthy" ]; do
            if [ $NEXT_WAIT_TIME -ge 60 ]; then
              echo "❌ Gateway container failed to reach healthy state"
              docker compose logs go-gateway
              exit 1
            fi
            sleep 5
            NEXT_WAIT_TIME=$((NEXT_WAIT_TIME + 5))
          done
          
          echo "Waiting for Platform Readiness (Backend Handshake)..."
          NEXT_WAIT_TIME=0
          until curl -s http://localhost:8080/health | grep -q 'UP'; do
            if [ $NEXT_WAIT_TIME -ge 120 ]; then
              echo "❌ Platform failed to reach UP state within 120s"
              docker compose logs go-gateway
              docker compose logs ai-service
              exit 1
            fi
            echo "Status: $(curl -s http://localhost:8080/health | jq -r .status || echo 'unknown') ($NEXT_WAIT_TIME/120s)"
            sleep 5
            NEXT_WAIT_TIME=$((NEXT_WAIT_TIME + 5))
          done
          echo "✅ Platform is fully UP and operational."

      - name: Run Smoke Test
        run: |
          # The platform is healthy, so this should pass immediately
          if ! curl -s http://localhost:8080/health | grep -q 'UP'; then
            echo "❌ Smoke test failed! Unexpected health response."
            docker compose logs go-gateway
            exit 1
          fi
          echo "✅ Smoke test verified."
