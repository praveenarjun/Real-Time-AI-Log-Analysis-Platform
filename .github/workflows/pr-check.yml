name: Pull Request Check

on:
  pull_request:
    branches: [ main ]

jobs:
  quality-check:
    name: Linting & Standards
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.25.0'
      - name: Go Lint
        uses: golangci/golangci-lint-action@v4
        with:
          version: latest

      - name: Setup Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'
      - name: Python Lint
        run: |
          pip install ruff
          ruff check python-ai-service/

  build-check:
    name: Build Verification
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - name: Verify Docker Builds
        run: |
          # Verify core services build correctly
          docker build -t test-gateway -f api-gateway/Dockerfile .
          docker build -t test-collector -f log-collector/Dockerfile .
          docker build -t test-ai -f python-ai-service/Dockerfile ./python-ai-service

  pr-status:
    name: PR Comment status
    needs: [quality-check, build-check]
    runs-on: ubuntu-latest
    if: always()
    steps:
      - name: Comment on PR
        uses: actions/github-script@v7
        with:
          script: |
            const { owner, repo, number } = context.issue;
            const status = "${{ job.status }}" === "success" ? "✅ All checks passed!" : "❌ Build or Lint failed. Please check logs.";
            github.rest.issues.createComment({
              owner,
              repo,
              issue_number: number,
              body: `### PR Build Report\n${status}`
            });
