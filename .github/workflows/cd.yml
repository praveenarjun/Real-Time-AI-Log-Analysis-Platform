# Continuous Deployment - Last Updated: 2026-04-11 14:55 UTC
name: Continuous Deployment

permissions:
  id-token: write
  contents: read

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    branches: [main]
    types:
      - completed

env:
  # FAIL-SAFE CONSTANTS (Hardcoded to avoid "Empty Secret" errors)
  ACR_NAME: acrlogpraveen99
  REGISTRY: acrlogpraveen99.azurecr.io
  AKS_RESOURCE_GROUP: rg-log-analyzer-dev
  AKS_CLUSTER_NAME: aks-log-analyzer-dev

jobs:
  build-and-push:
    name: Build & Push to ACR
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Set up QEMU
        uses: docker/setup-qemu-action@v3

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Build & Push Gateway
        uses: docker/build-push-action@v5
        with:
          context: .
          file: api-gateway/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/go-gateway:${{ github.sha }},${{ env.REGISTRY }}/go-gateway:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Collector
        uses: docker/build-push-action@v5
        with:
          context: .
          file: log-collector/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/go-collector:${{ github.sha }},${{ env.REGISTRY }}/go-collector:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push AI Service
        uses: docker/build-push-action@v5
        with:
          context: ./python-ai-service
          push: true
          tags: ${{ env.REGISTRY }}/python-ai:${{ github.sha }},${{ env.REGISTRY }}/python-ai:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Log Simulator
        uses: docker/build-push-action@v5
        with:
          context: ./log-simulator
          push: true
          tags: ${{ env.REGISTRY }}/log-simulator:${{ github.sha }},${{ env.REGISTRY }}/log-simulator:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Alerter
        uses: docker/build-push-action@v5
        with:
          context: .
          file: alerting/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/go-alerter:${{ github.sha }},${{ env.REGISTRY }}/go-alerter:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push Frontend
        uses: docker/build-push-action@v5
        with:
          context: ./frontend
          file: ./frontend/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/frontend:${{ github.sha }},${{ env.REGISTRY }}/frontend:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

      - name: Build & Push workforce-service
        uses: docker/build-push-action@v5
        with:
          context: .
          file: workforce-service/Dockerfile
          push: true
          tags: ${{ env.REGISTRY }}/workforce-service:${{ github.sha }},${{ env.REGISTRY }}/workforce-service:latest
          cache-from: type=gha
          cache-to: type=gha,mode=max

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: DNS Stabilization Sleep
        run: sleep 10

      - name: Deploy Manifests
        run: |
          SHA=${{ github.sha }}
          REGISTRY=${{ env.REGISTRY }}
          
          # Use sed to update image tags dynamically
          sed -i "s|image: .*/go-gateway:.*|image: $REGISTRY/go-gateway:$SHA|g" infra/k8s/go-gateway-deployment.yml
          sed -i "s|image: .*/go-collector:.*|image: $REGISTRY/go-collector:$SHA|g" infra/k8s/go-collector-deployment.yml
          sed -i "s|image: .*/python-ai:.*|image: $REGISTRY/python-ai:$SHA|g" infra/k8s/ai-service-deployment.yml
          sed -i "s|image: .*/log-simulator:.*|image: $REGISTRY/log-simulator:$SHA|g" infra/k8s/log-simulator-deployment.yml
          sed -i "s|image: .*/go-alerter:.*|image: $REGISTRY/go-alerter:$SHA|g" infra/k8s/go-alerter-deployment.yml
          sed -i "s|image: .*/frontend:.*|image: $REGISTRY/frontend:$SHA|g" infra/k8s/frontend-deployment.yml
          sed -i "s|image: .*/workforce-service:.*|image: $REGISTRY/workforce-service:$SHA|g" infra/k8s/workforce-service-deployment.yml
          
          kubectl apply -f infra/k8s/ --validate=false
          kubectl rollout status deployment go-gateway -n forensic-platform
          kubectl rollout status deployment go-collector -n forensic-platform
          kubectl rollout status deployment ai-service -n forensic-platform
          kubectl rollout status deployment frontend -n forensic-platform
          kubectl rollout restart deployment frontend -n forensic-platform
          kubectl rollout status deployment workforce-service -n forensic-platform

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}


      - name: Deploy to Production
        run: |
          # Production follows the same logic as staging for this project
          kubectl apply -f infra/k8s/ --validate=false
          echo "Production Rollout Complete"
