# Continuous Deployment - Last Updated: 2026-04-11 14:55 UTC
name: Continuous Deployment

permissions:
  id-token: write
  contents: read

on:
  workflow_run:
    workflows: ["Continuous Integration"]
    branches: [main]
    types:
      - completed

env:
  # FAIL-SAFE CONSTANTS (Hardcoded to avoid "Empty Secret" errors)
  ACR_NAME: acrlogpraveen99
  REGISTRY: acrlogpraveen99.azurecr.io
  AKS_RESOURCE_GROUP: rg-log-analyzer-dev
  AKS_CLUSTER_NAME: aks-log-analyzer-dev

jobs:
  build-and-push:
    name: Build & Push to ACR
    if: ${{ github.event.workflow_run.conclusion == 'success' }}
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Login to ACR
        run: |
          az acr login --name ${{ env.ACR_NAME }}

      - name: Build & Push Services
        run: |
          SHA=${{ github.sha }}
          REGISTRY=${{ env.REGISTRY }}

          # Build and push Gateway
          docker build -t $REGISTRY/go-gateway:$SHA -t $REGISTRY/go-gateway:latest -f api-gateway/Dockerfile .
          docker push $REGISTRY/go-gateway:$SHA
          docker push $REGISTRY/go-gateway:latest

          # Build and push Collector
          docker build -t $REGISTRY/go-collector:$SHA -t $REGISTRY/go-collector:latest -f log-collector/Dockerfile .
          docker push $REGISTRY/go-collector:$SHA
          docker push $REGISTRY/go-collector:latest

          # Build and push AI Service
          docker build -t $REGISTRY/python-ai:$SHA -t $REGISTRY/python-ai:latest ./python-ai-service
          docker push $REGISTRY/python-ai:$SHA
          docker push $REGISTRY/python-ai:latest

          # Build and push Log Simulator
          docker build -t $REGISTRY/log-simulator:$SHA -t $REGISTRY/log-simulator:latest ./log-simulator
          docker push $REGISTRY/log-simulator:$SHA
          docker push $REGISTRY/log-simulator:latest

          # Build and push Alerter
          docker build -t $REGISTRY/go-alerter:$SHA -t $REGISTRY/go-alerter:latest -f alerting/Dockerfile .
          docker push $REGISTRY/go-alerter:$SHA
          docker push $REGISTRY/go-alerter:latest

          # Build and push Frontend
          docker build -t $REGISTRY/frontend:$SHA -t $REGISTRY/frontend:latest -f frontend/Dockerfile ./frontend
          docker push $REGISTRY/frontend:$SHA
          docker push $REGISTRY/frontend:latest

          # Build and push Workforce Service
          docker build -t $REGISTRY/workforce-service:$SHA -t $REGISTRY/workforce-service:latest -f workforce-service/Dockerfile .
          docker push $REGISTRY/workforce-service:$SHA
          docker push $REGISTRY/workforce-service:latest

  deploy-staging:
    name: Deploy to Staging
    needs: build-and-push
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}

      - name: DNS Stabilization Sleep
        run: sleep 10

      - name: Deploy Manifests
        run: |
          SHA=${{ github.sha }}
          REGISTRY=${{ env.REGISTRY }}
          
          # Use sed to update image tags dynamically
          sed -i "s|image: .*/go-gateway:.*|image: $REGISTRY/go-gateway:$SHA|g" infra/k8s/go-gateway-deployment.yml
          sed -i "s|image: .*/go-collector:.*|image: $REGISTRY/go-collector:$SHA|g" infra/k8s/go-collector-deployment.yml
          sed -i "s|image: .*/python-ai:.*|image: $REGISTRY/python-ai:$SHA|g" infra/k8s/ai-service-deployment.yml
          sed -i "s|image: .*/log-simulator:.*|image: $REGISTRY/log-simulator:$SHA|g" infra/k8s/log-simulator-deployment.yml
          sed -i "s|image: .*/go-alerter:.*|image: $REGISTRY/go-alerter:$SHA|g" infra/k8s/go-alerter-deployment.yml
          sed -i "s|image: .*/frontend:.*|image: $REGISTRY/frontend:$SHA|g" infra/k8s/frontend-deployment.yml
          sed -i "s|image: .*/workforce-service:.*|image: $REGISTRY/workforce-service:$SHA|g" infra/k8s/workforce-service-deployment.yml
          
          kubectl apply -f infra/k8s/ --validate=false
          kubectl rollout status deployment go-gateway -n forensic-platform
          kubectl rollout status deployment go-collector -n forensic-platform
          kubectl rollout status deployment ai-service -n forensic-platform
          kubectl rollout status deployment frontend -n forensic-platform
          kubectl rollout status deployment workforce-service -n forensic-platform

  deploy-production:
    name: Deploy to Production
    needs: deploy-staging
    runs-on: ubuntu-latest
    environment: production
    steps:
      - uses: actions/checkout@v4

      - name: Azure Login
        uses: azure/login@v2
        with:
          client-id: ${{ secrets.AZURE_CLIENT_ID }}
          tenant-id: ${{ secrets.AZURE_TENANT_ID }}
          subscription-id: ${{ secrets.AZURE_SUBSCRIPTION_ID }}

      - name: Set AKS Context
        uses: azure/aks-set-context@v3
        with:
          resource-group: ${{ env.AKS_RESOURCE_GROUP }}
          cluster-name: ${{ env.AKS_CLUSTER_NAME }}


      - name: Deploy to Production
        run: |
          # Production follows the same logic as staging for this project
          kubectl apply -f infra/k8s/ --validate=false
          echo "Production Rollout Complete"
