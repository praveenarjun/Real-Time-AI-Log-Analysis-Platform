apiVersion: apps/v1
kind: Deployment
metadata:
  name: ai-service
  namespace: forensic-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: ai-service
  template:
    metadata:
      labels:
        app: ai-service
      annotations:
        ad.datadoghq.com/python-ai.logs: '[{"source": "python", "service": "ai-service"}]'
        # Datadog monitoring for the KAFKA connection (Aiven)
        # Using heartbeats inside app logs instead of Agent check to avoid SSL CA trust noise.
        # ad.datadoghq.com/python-ai.check_names: '["kafka_consumer"]'
    spec:
      # --- ADDITION 1: Define the Certificate Volume ---
      volumes:
      - name: kafka-certs-vol
        secret:
          secretName: kafka-certs
      # ------------------------------------------------
      containers:
      - name: python-ai
        image: acrlogpraveen99.azurecr.io/python-ai:latest
        # --- ADDITION 2: Mount the Certificates folder ---
        volumeMounts:
        - name: kafka-certs-vol
          mountPath: "/app/certs"
          readOnly: true
        # -------------------------------------------------
        resources:
          requests:
            cpu: "100m"
            memory: "256Mi"
          limits:
            cpu: "500m"
            memory: "1Gi"
        envFrom:
        - configMapRef:
            name: log-analyzer-config
        - secretRef:
            name: forensic-secrets
        ports:
        - containerPort: 8000
---
apiVersion: v1
kind: Service
metadata:
  name: ai-service
  namespace: forensic-platform
spec:
  selector:
    app: ai-service
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8000
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: ai-service-hpa
  namespace: forensic-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: ai-service
  minReplicas: 2
  maxReplicas: 10
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70