# WARNING: Do not put real secrets in this file if you are committing to Git.
# Use GitHub Secrets or 'kubectl create secret' manually for production.
apiVersion: v1
kind: Secret
metadata:
  name: forensic-secrets
  namespace: forensic-platform
type: Opaque
stringData:
  AZURE_OPENAI_API_KEY: "PLACEHOLDER_AZURE_KEY"
  AZURE_OPENAI_ENDPOINT: "PLACEHOLDER_AZURE_URL"
  KAFKA_BROKERS: "PLACEHOLDER_KAFKA_BROKER"
  UPSTASH_REDIS_URL: "PLACEHOLDER_REDIS_URL"
  DATABASE_URL: "PLACEHOLDER_DATABASE_URL"
  # Optional: Grafana/Notification keys
  SLACK_WEBHOOK_URL: "PLACEHOLDER_SLACK_URL"
