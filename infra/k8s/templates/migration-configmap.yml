apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-migration-sql
  namespace: forensic-platform
data:
  001_initial_schema.sql: |
    -- Extensions
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    -- 1. Departments Table
    CREATE TABLE IF NOT EXISTS "Departments" (
        "id" UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        "Name" VARCHAR(255) UNIQUE NOT NULL,
        "Description" TEXT,
        "ManagerId" UUID,
        "IsActive" BOOLEAN DEFAULT true,
        "CreatedAt" TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        "UpdatedAt" TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- 2. Employees Table
    CREATE TABLE IF NOT EXISTS "Employees" (
        "id" UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        "EmployeeCode" VARCHAR(50) UNIQUE NOT NULL,
        "FirstName" VARCHAR(100) NOT NULL,
        "LastName" VARCHAR(100) NOT NULL,
        "Email" VARCHAR(255) UNIQUE NOT NULL,
        "Phone" VARCHAR(20),
        "DateOfBirth" DATE,
        "Gender" VARCHAR(20),
        "DepartmentId" UUID REFERENCES "Departments"("id"),
        "ManagerId" UUID REFERENCES "Employees"("id"),
        "HireDate" DATE NOT NULL,
        "Position" VARCHAR(100),
        "Salary" DECIMAL(15, 2),
        "Address" TEXT,
        "IsActive" BOOLEAN DEFAULT true,
        "CreatedAt" TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        "UpdatedAt" TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- Self-ref FK for Department Manager
    ALTER TABLE "Departments" ADD CONSTRAINT fk_department_manager FOREIGN KEY ("ManagerId") REFERENCES "Employees"("id");

    -- 3. Users Table
    CREATE TABLE IF NOT EXISTS "Users" (
        "id" UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        "Username" VARCHAR(100) UNIQUE NOT NULL,
        "Email" VARCHAR(255) UNIQUE NOT NULL,
        "PasswordHash" TEXT NOT NULL,
        "Role" VARCHAR(50) NOT NULL,
        "EmployeeId" UUID REFERENCES "Employees"("id"),
        "RefreshToken" TEXT,
        "RefreshTokenExpiry" TIMESTAMP WITH TIME ZONE,
        "CreatedAt" TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- 4. Attendance Table
    CREATE TABLE IF NOT EXISTS "Attendance" (
        "id" UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        "EmployeeId" UUID NOT NULL REFERENCES "Employees"("id"),
        "Date" DATE NOT NULL,
        "CheckIn" TIMESTAMP WITH TIME ZONE,
        "CheckOut" TIMESTAMP WITH TIME ZONE,
        "Status" VARCHAR(50) NOT NULL,
        "Notes" TEXT,
        "CreatedAt" TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        "UpdatedAt" TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        UNIQUE("EmployeeId", "Date")
    );

    -- 5. LeaveRequests Table
    CREATE TABLE IF NOT EXISTS "LeaveRequests" (
        "id" UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        "EmployeeId" UUID NOT NULL REFERENCES "Employees"("id"),
        "LeaveType" VARCHAR(50) NOT NULL,
        "StartDate" DATE NOT NULL,
        "EndDate" DATE NOT NULL,
        "TotalDays" INTEGER NOT NULL,
        "Reason" TEXT,
        "Status" VARCHAR(50) DEFAULT 'PENDING',
        "ApprovedById" UUID REFERENCES "Employees"("id"),
        "ApprovedDate" TIMESTAMP WITH TIME ZONE,
        "Comments" TEXT,
        "CreatedAt" TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        "UpdatedAt" TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- Functions
    CREATE OR REPLACE FUNCTION "GetDepartmentHeadcount"()
    RETURNS TABLE("DepartmentName" VARCHAR, "Headcount" BIGINT, "SalaryPercentage" DOUBLE PRECISION) AS $$
    BEGIN
        RETURN QUERY
        SELECT 
            d."Name",
            COUNT(e."id"),
            COALESCE((SUM(e."Salary") / NULLIF(SUM(SUM(e."Salary")) OVER (), 0)) * 100, 0)
        FROM "Departments" d
        LEFT JOIN "Employees" e ON d."id" = e."DepartmentId" AND e."IsActive" = true
        GROUP BY d."Name";
    END;
    $$ LANGUAGE plpgsql;

  002_seed_data.sql: |
    -- Seeding Departments
    INSERT INTO "Departments" ("id", "Name", "Description") VALUES
    ('d1000000-0000-0000-0000-000000000001', 'Engineering', 'Core product development'),
    ('d1000000-0000-0000-0000-000000000002', 'Security', 'Cybersecurity and forensics'),
    ('d1000000-0000-0000-0000-000000000003', 'DevOps', 'Infrastructure and CI/CD')
    ON CONFLICT ("Name") DO NOTHING;

    -- Seeding Employees
    INSERT INTO "Employees" ("id", "EmployeeCode", "FirstName", "LastName", "Email", "DepartmentId", "HireDate", "Position", "Salary") VALUES
    ('e1000000-0000-0000-0000-000000000001', 'EMP-001', 'Praveen', 'Challa', 'praveen@praveen-challa.tech', 'd1000000-0000-0000-0000-000000000001', '2024-01-01', 'Lead Engineer', 150000),
    ('e1000000-0000-0000-0000-000000000002', 'EMP-002', 'Forensic', 'Agent', 'agent@praveen-challa.tech', 'd1000000-0000-0000-0000-000000000002', '2024-01-05', 'Security Researcher', 120000),
    ('e1000000-0000-0000-0000-000000000003', 'EMP-003', 'John', 'Doe', 'john@praveen-challa.tech', 'd1000000-0000-0000-0000-000000000001', '2024-02-10', 'Software Architect', 140000)
    ON CONFLICT ("EmployeeCode") DO NOTHING;
