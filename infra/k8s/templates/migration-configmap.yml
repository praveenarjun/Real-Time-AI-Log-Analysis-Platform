apiVersion: v1
kind: ConfigMap
metadata:
  name: pg-migration-sql
  namespace: forensic-platform
data:
  001_initial_schema.sql: |
    -- Extensions
    CREATE EXTENSION IF NOT EXISTS "uuid-ossp";

    -- 1. Departments Table
    CREATE TABLE IF NOT EXISTS departments (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        name VARCHAR(255) UNIQUE NOT NULL,
        description TEXT,
        manager_id UUID,
        is_active BOOLEAN DEFAULT true,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- 2. Employees Table
    CREATE TABLE IF NOT EXISTS employees (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        employee_code VARCHAR(50) UNIQUE NOT NULL,
        first_name VARCHAR(100) NOT NULL,
        last_name VARCHAR(100) NOT NULL,
        email VARCHAR(255) UNIQUE NOT NULL,
        phone VARCHAR(20),
        date_of_birth DATE,
        gender VARCHAR(20),
        department_id UUID REFERENCES departments(id),
        manager_id UUID REFERENCES employees(id),
        hire_date DATE NOT NULL,
        position VARCHAR(100),
        salary DECIMAL(15, 2),
        address TEXT,
        is_active BOOLEAN DEFAULT true,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- Self-ref FK for Department Manager
    ALTER TABLE departments ADD CONSTRAINT fk_department_manager FOREIGN KEY (manager_id) REFERENCES employees(id);

    -- 3. Users Table
    CREATE TABLE IF NOT EXISTS users (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        username VARCHAR(100) UNIQUE NOT NULL,
        email VARCHAR(255) UNIQUE NOT NULL,
        password_hash TEXT NOT NULL,
        role VARCHAR(50) NOT NULL,
        employee_id UUID REFERENCES employees(id),
        refresh_token TEXT,
        refresh_token_expiry TIMESTAMP WITH TIME ZONE,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- 4. Attendance Table
    CREATE TABLE IF NOT EXISTS attendance (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        employee_id UUID NOT NULL REFERENCES employees(id),
        date DATE NOT NULL,
        check_in TIMESTAMP WITH TIME ZONE,
        check_out TIMESTAMP WITH TIME ZONE,
        status VARCHAR(50) NOT NULL,
        notes TEXT,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        UNIQUE(employee_id, date)
    );

    -- 5. LeaveRequests Table
    CREATE TABLE IF NOT EXISTS leave_requests (
        id UUID PRIMARY KEY DEFAULT uuid_generate_v4(),
        employee_id UUID NOT NULL REFERENCES employees(id),
        leave_type VARCHAR(50) NOT NULL,
        start_date DATE NOT NULL,
        end_date DATE NOT NULL,
        total_days INTEGER NOT NULL,
        reason TEXT,
        status VARCHAR(50) DEFAULT 'PENDING',
        approved_by_id UUID REFERENCES employees(id),
        approved_date TIMESTAMP WITH TIME ZONE,
        comments TEXT,
        created_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP,
        updated_at TIMESTAMP WITH TIME ZONE DEFAULT CURRENT_TIMESTAMP
    );

    -- INDEXES
    CREATE INDEX IF NOT EXISTS idx_employee_department ON employees (department_id);
    CREATE INDEX IF NOT EXISTS idx_employee_manager ON employees (manager_id);
    CREATE INDEX IF NOT EXISTS idx_employee_active_dept ON employees (is_active, department_id);
    CREATE INDEX IF NOT EXISTS idx_employee_name ON employees (last_name, first_name);
    CREATE INDEX IF NOT EXISTS idx_attendance_emp_date ON attendance (employee_id, date);
    CREATE INDEX IF NOT EXISTS idx_attendance_date_status ON attendance (date, status);
    CREATE INDEX IF NOT EXISTS idx_leave_emp_status ON leave_requests (employee_id, status);
    CREATE INDEX IF NOT EXISTS idx_leave_status_date ON leave_requests (status, start_date);

    -- Functions
    CREATE OR REPLACE FUNCTION get_department_headcount()
    RETURNS TABLE(department_name VARCHAR, headcount BIGINT, salary_percentage DOUBLE PRECISION) AS $$
    END;
    $$ LANGUAGE plpgsql;

  002_seed_data.sql: |
    -- Clean Slate guards
    DELETE FROM attendance;
    DELETE FROM leave_requests;
    DELETE FROM users;
    DELETE FROM employees;
    DELETE FROM departments;

    -- Seeding Departments
    INSERT INTO departments (id, name, description) VALUES
    ('d1000000-0000-0000-0000-000000000001', 'Engineering', 'Core product development'),
