# WARNING: Do not put real secrets here! 
# Use GitHub Secrets or a specialized tool like External Secrets/Vault.
apiVersion: v1
kind: Secret
metadata:
  name: log-analyzer-secrets
  namespace: forensic-platform
type: Opaque
stringData:
  AZURE_OPENAI_API_KEY: "PLACEHOLDER_AZURE_KEY"
  KAFKA_USER: "PLACEHOLDER_KAFKA_USER"
  KAFKA_PASS: "PLACEHOLDER_KAFKA_PASS"
  KAFKA_BROKERS: "PLACEHOLDER_KAFKA_BROKER"
  KAFKA_CA_PATH: "/app/certs/ca.pem"
  KAFKA_CERT_PATH: "/app/certs/service.cert"
  KAFKA_KEY_PATH: "/app/certs/service.key"
  REDIS_PASS: "PLACEHOLDER_REDIS_PASS"
  GRAFANA_TOKEN: "PLACEHOLDER_GRAFANA_TOKEN"
  DATABASE_URL: "PLACEHOLDER_DATABASE_URL"
