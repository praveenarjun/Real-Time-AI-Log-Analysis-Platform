apiVersion: apps/v1
kind: Deployment
metadata:
  name: react-frontend
  namespace: forensic-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: frontend
  template:
    metadata:
      labels:
        app: frontend
    spec:
      imagePullSecrets:
      - name: acr-pull-secret
      containers:
      - name: ui
        image: acrlogpraveen99.azurecr.io/react-ui:latest
        env:
        - name: NEXT_PUBLIC_API_URL
          value: "http://20.200.255.31"
        - name: NEXT_PUBLIC_WS_URL
          value: "ws://20.200.255.31/api/v1/ws/stream"
        resources:
          requests:
            cpu: "100m"
            memory: "128Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        ports:
        - containerPort: 3000
---
apiVersion: v1
kind: Service
metadata:
  name: frontend
  namespace: forensic-platform
spec:
  type: LoadBalancer
  selector:
    app: frontend
  ports:
    - protocol: TCP
      port: 80
      targetPort: 3000
