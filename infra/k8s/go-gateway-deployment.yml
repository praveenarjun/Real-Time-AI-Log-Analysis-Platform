apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-gateway
  namespace: forensic-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-gateway
  template:
    metadata:
      labels:
        app: go-gateway
      annotations:
        ad.datadoghq.com/gateway.logs: '[{"source": "go", "service": "api-gateway"}]'
    spec:
      volumes:
      - name: kafka-certs-vol
        secret:
          secretName: kafka-certs
      - name: config-vol
        configMap:
          name: gateway-config-file
      containers:
      - name: gateway
        image: acrlogpraveen99.azurecr.io/go-gateway:latest
        imagePullPolicy: Always
        # Fixed: Removed placeholder DATABASE_URL export that was breaking Supabase connectivity
        volumeMounts:
        - name: kafka-certs-vol
          mountPath: "/app/certs"
          readOnly: true
        - name: config-vol
          mountPath: "/home/appuser/config"
          readOnly: true
        resources:
          requests:
            cpu: "50m"
            memory: "64Mi"
          limits:
            cpu: "200m"
            memory: "256Mi"
        # REMOVED HARDCODED DATABASE_URL (EXORCISED!)
        envFrom:
        - configMapRef:
            name: log-analyzer-config
        - secretRef:
            name: forensic-secrets # Single source of truth for DB, Kafka, Redis credentials
        ports:
        - containerPort: 8080
        livenessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 10
          periodSeconds: 15
        readinessProbe:
          httpGet:
            path: /health
            port: 8080
          initialDelaySeconds: 5
          periodSeconds: 10
---
apiVersion: v1
kind: Service
metadata:
  name: go-gateway
  namespace: forensic-platform
spec:
  type: LoadBalancer
  selector:
    app: go-gateway
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
---
apiVersion: autoscaling/v2
kind: HorizontalPodAutoscaler
metadata:
  name: go-gateway-hpa
  namespace: forensic-platform
spec:
  scaleTargetRef:
    apiVersion: apps/v1
    kind: Deployment
    name: go-gateway
  minReplicas: 1
  maxReplicas: 5
  metrics:
  - type: Resource
    resource:
      name: cpu
      target:
        type: Utilization
        averageUtilization: 70