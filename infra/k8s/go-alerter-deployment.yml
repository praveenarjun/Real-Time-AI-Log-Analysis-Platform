apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-alerter
  namespace: forensic-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: go-alerter
  strategy:
    type: Recreate
  template:
    metadata:
      labels:
        app: go-alerter
    spec:
      containers:
      - name: alerter
        image: acrlogpraveen99.azurecr.io/go-alerter:latest
        resources:
          requests:
            cpu: "25m"
            memory: "64Mi"
          limits:
            cpu: "500m"
            memory: "512Mi"
        envFrom:
        - configMapRef:
            name: log-analyzer-config
        - secretRef:
            name: forensic-secrets
        ports:
        - containerPort: 8080
---
apiVersion: v1
kind: Service
metadata:
  name: go-alerter
  namespace: forensic-platform
spec:
  selector:
    app: go-alerter
  ports:
    - protocol: TCP
      port: 80
      targetPort: 8080
