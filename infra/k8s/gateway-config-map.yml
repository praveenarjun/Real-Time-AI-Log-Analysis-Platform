apiVersion: v1
kind: ConfigMap
metadata:
  name: gateway-config-file
  namespace: forensic-platform
data:
  config.yaml: |
    server:
      gatewayPort: 8080
    kafka:
      brokers: ["PLACEHOLDER_KAFKA_BROKER"]
      tls: true
      ca_path: "/app/certs/ca.pem"
      cert_path: "/app/certs/service.cert"
      key_path: "/app/certs/service.key"
    database:
      dsn: "PLACEHOLDER_DATABASE_URL"
    redis:
      url: "PLACEHOLDER_REDIS_URL"
    logging:
      level: "info"
