apiVersion: batch/v1
kind: Job
metadata:
  name: database-migration-v2
  namespace: forensic-platform
spec:
  template:
    spec:
      containers:
      - name: psql
        image: postgres:15-alpine
        env:
        - name: DATABASE_URL
          valueFrom:
            secretKeyRef:
              name: forensic-secrets
              key: DATABASE_URL
        command:
        - /bin/sh
        - -c
        - |
          echo "TESTING CONNECTIVITY TO SUPABASE..."
          psql "$DATABASE_URL" -c "SELECT current_database();"
          echo "EXECUTING INITIAL SCHEMA RECONSTRUCTION..."
          psql "$DATABASE_URL" -f /migrations/001_initial_schema.sql
          echo "MIGRATION COMPLETE."
        volumeMounts:
        - name: sql-volume
          mountPath: /migrations
      volumes:
      - name: sql-volume
        configMap:
          name: pg-migration-sql
      restartPolicy: Never
  backoffLimit: 2
