apiVersion: apps/v1
kind: Deployment
metadata:
  name: loki
  namespace: forensic-platform
spec:
  replicas: 1
  selector:
    matchLabels:
      app: loki
  template:
    metadata:
      labels:
        app: loki
    spec:
      containers:
        - name: loki
          image: grafana/loki:latest
          ports:
            - containerPort: 3100
          resources:
            requests:
              cpu: 100m
              memory: 256Mi
            limits:
              cpu: 500m
              memory: 1Gi
---
apiVersion: v1
kind: Service
metadata:
  name: loki
  namespace: forensic-platform
spec:
  ports:
    - port: 3100
      targetPort: 3100
  selector:
    app: loki
