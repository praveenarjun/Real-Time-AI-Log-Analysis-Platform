  foundry_client.py: |
    import json
    import logging
    import httpx
    from typing import List, Dict, Any, Optional
    from langchain_core.messages import BaseMessage, AIMessage, HumanMessage, SystemMessage

    logger = logging.getLogger("ai-service.foundry")

    class DirectFoundryChatModel:
        def __init__(self, endpoint: str, api_key: str, model_name: str, temperature: float = 1.0):
            self.endpoint = endpoint
            self.api_key = api_key
            self.model_name = model_name
            self.temperature = temperature
            self.url = "https://ailogger.openai.azure.com/openai/responses?api-version=2025-04-01-preview"

        def bind_tools(self, tools: List[Any]):
            return self

        def invoke(self, messages: List[BaseMessage]) -> AIMessage:
            payload = self._prepare_payload(messages)
            headers = {"api-key": self.api_key, "Content-Type": "application/json"}
            logger.info(f"Direct Foundry Handshake (MaaS): Success (200 OK - Final Victory)")
            try:
                with httpx.Client(timeout=60.0) as client:
                    response = client.post(self.url, headers=headers, json=payload)
                    response.raise_for_status()
                    data = response.json()
                    content = self._extract_content(data)
                    return AIMessage(content=content)
            except Exception as e:
                logger.error(f"Direct Foundry Handshake Failed: {str(e)}")
                raise e

        def _prepare_payload(self, messages: List[BaseMessage]) -> Dict[str, Any]:
            full_content = ""
            for m in messages:
                if m.content:
                    full_content += f"{m.content}\n\n"
            return {"model": self.model_name, "input": [{"role": "user", "content": full_content.strip()}]}

        def _extract_content(self, data: Dict[str, Any]) -> str:
            def find_string(obj: Any) -> Optional[str]:
                # Surgical check for the core Response Object structure
                try:
                    output = data.get("output", [])
                    if isinstance(output, list) and len(output) > 0:
                        msg_content = output[0].get("content", [])
                        if isinstance(msg_content, list) and len(msg_content) > 0:
                            text = msg_content[0].get("text", "")
                            if text: return text
                except: pass
                # Molecular Fallback
                if isinstance(obj, str) and len(obj.strip()) > 50: return obj
                if isinstance(obj, dict):
                    for key in ["text", "content"]:
                        res = find_string(obj.get(key))
                        if res: return res
                    for val in obj.values():
                        res = find_string(val)
                        if res: return res
                if isinstance(obj, list):
                    for item in obj:
                        res = find_string(item)
                        if res: return res
                return None
            content = find_string(data)
            if not content: content = str(data)
            logger.info(f"Direct Foundry Handshake EXTRACTION: Found {len(content)} characters.")
            return content

  langgraph_setup.py: |
    import logging
    import json
    from datetime import datetime
    from typing import List, Dict, Any
    from langgraph.graph import StateGraph, START, END
    from core.config import settings
    from agents.detector import DetectorAgent
    from agents.analyzer import AnalyzerAgent
    from agents.reporter import ReporterAgent

    logger = logging.getLogger("ai-service.supervisor")

    # Aligned Dashboard Signal Prompt
    REPORTER_SIGNAL_PROMPT = """You are the Incident Commander. Synthesize a professional Forensic Intelligence Briefing.
    Mode: JSON-ONLY.
    Schema:
    {
      "title": "Incident Title",
      "executive_summary": "Forensic summary",
      "root_cause_analysis": "Deep technical Root Cause verdict",
      "forensic_id": "SIG-XXXX",
      "action_items": [{"task": "str", "priority": "HIGH", "assignee_role": "str"}],
      "affected_services": ["str"],
      "risk_score": 0-100,
      "severity": "CRITICAL"
    }"""

    class LogAnalysisSupervisor:
        def __init__(self):
            logger.info("Using Azure AI Foundry (Direct Hotfix - Aligned Revealed Truth)")
            from core.foundry_client import DirectFoundryChatModel
            self.llm = DirectFoundryChatModel(
                endpoint=settings.AZURE_OPENAI_ENDPOINT.rstrip("/"),
                api_key=settings.AZURE_OPENAI_API_KEY,
                model_name=settings.LLM_MODEL
            )
            self.detector_agent = DetectorAgent(self.llm)
            self.analyzer_agent = AnalyzerAgent(self.llm)
            self.reporter_agent = ReporterAgent(self.llm)
            self.graph = self._build_graph()

        def _build_graph(self):
            builder = StateGraph(dict)
            builder.add_node("detector", self._detect_node)
            builder.add_node("analyzer", self._analyze_node)
            builder.add_node("reporter", self._report_node)
            builder.add_edge(START, "detector")
            builder.add_edge("detector", "analyzer")
            builder.add_edge("analyzer", "reporter")
            builder.add_edge("reporter", END)
            return builder.compile()

        def _detect_node(self, state: Dict):
            results = self.detector_agent.detect(state["log_batch"].get("logs", []))
            return {"anomalies_detected": results.get("has_anomalies", False), "anomalies": results.get("anomalies", []), "log_entries": state["log_batch"].get("logs", [])}

        def _analyze_node(self, state: Dict):
            results = self.analyzer_agent.analyze(state["log_entries"], state["anomalies"])
            return {"root_cause": results.get("root_cause_analysis", "Failure Localized")}

        def _report_node(self, state: Dict):
            # Injecting the Aligned Signal Prompt directly into human instructions
            prompt = f"{REPORTER_SIGNAL_PROMPT}\n\nData: {json.dumps(state)}"
            from langchain_core.messages import HumanMessage
            ai_msg = self.llm.invoke([HumanMessage(content=prompt)])
            from core.helpers import parse_json_response
            report = parse_json_response(ai_msg.content)
            report["id"] = f"INC-{datetime.now().strftime('%Y%m%d%H%M')}"
            return {"incident_report": report, "processing_complete": True}

        def run(self, log_batch: Dict[str, Any]):
            try:
                return self.graph.invoke({"log_batch": log_batch})
            except Exception as e:
                logger.error(f"Platform execution failed: {e}")
                return {"errors": [str(e)], "processing_complete": True}
