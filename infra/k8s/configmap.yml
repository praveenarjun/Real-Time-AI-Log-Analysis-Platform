apiVersion: v1
kind: ConfigMap
metadata:
  name: log-analyzer-config
  namespace: forensic-platform
data:
  ENVIRONMENT: "dev"
  KAFKA_BROKERS: "PLACEHOLDER_KAFKA_BROKER"
  KAFKA_TOPIC_RAW: "forensic.logs.raw"
  KAFKA_TOPIC_ANOMALIES: "forensic.anomalies"
  KAFKA_TOPIC_REPORTS: "forensic.incidents"
  KAFKA_TLS: "true"
  KAFKA_CA_PATH: "/app/certs/ca.pem"
  KAFKA_CERT_PATH: "/app/certs/service.cert"
  KAFKA_KEY_PATH: "/app/certs/service.key"
  GRAFANA_URL: "REDACTED"
  UPSTASH_REDIS_URL: "REDACTED"
  # --- AI Configuration ---
  LLM_PROVIDER: "azure"
  LLM_MODEL: "gpt-5.4-nano"
  AZURE_OPENAI_ENDPOINT: "PLACEHOLDER_AZURE_URL"
  AZURE_OPENAI_DEPLOYMENT_ID: "gpt-5.4-nano"
  OPENAI_API_VERSION: "2025-04-01-preview"
