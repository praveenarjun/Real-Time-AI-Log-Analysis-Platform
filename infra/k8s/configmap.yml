apiVersion: v1
kind: ConfigMap
metadata:
  name: log-analyzer-config
  namespace: forensic-platform
data:
  ENVIRONMENT: "dev"
  KAFKA_BROKERS: "forensic-kafka-ai-log-analyser.l.aivencloud.com:19800"
  KAFKA_TOPIC_RAW: "raw-logs"
  KAFKA_TOPIC_ANOMALIES: "anomalies"
  KAFKA_TOPIC_REPORTS: "incident-reports"
  KAFKA_TLS: "true"
  KAFKA_CA_PATH: "/app/certs/ca.pem"
  KAFKA_CERT_PATH: "/app/certs/service.cert"
  KAFKA_KEY_PATH: "/app/certs/service.key"
  # --- Operational Settings ---
  BATCH_SIZE: "1"
  FLUSH_INTERVAL: "1s"
  # --- AI Configuration ---
  LLM_PROVIDER: "azure"
  LLM_MODEL: "gpt-5.4-nano"
  AZURE_OPENAI_ENDPOINT: "https://e22cs-mnom9g4r-eastus2.cognitiveservices.azure.com/"
  AZURE_OPENAI_DEPLOYMENT_ID: "gpt-5.4-nano"
  OPENAI_API_VERSION: "2025-04-01-preview"
  AI_SERVICE_GRPC: "ai-service.forensic-platform.svc.cluster.local:50051"
