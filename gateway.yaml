apiVersion: apps/v1
kind: Deployment
metadata:
  name: go-gateway
  namespace: forensic-platform
spec:
  replicas: 2
  selector:
    matchLabels:
      app: go-gateway
  strategy:
    rollingUpdate:
      maxSurge: 25%
      maxUnavailable: 25%
    type: RollingUpdate
  template:
    metadata:
      labels:
        app: go-gateway
    spec:
      containers:
      - name: gateway
        image: acrlogpraveen99.azurecr.io/go-gateway:latest
        imagePullPolicy: Always
        ports:
        - containerPort: 8080
          protocol: TCP
        env:
        - name: KAFKA_TOPIC
          value: raw-logs
        resources:
          limits:
            cpu: 500m
            memory: 512Mi
          requests:
            cpu: 100m
            memory: 128Mi
        volumeMounts:
        - name: kafka-certs
          mountPath: /app/certs
          readOnly: true
        terminationMessagePath: /dev/termination-log
        terminationMessagePolicy: File
      dnsPolicy: ClusterFirst
      nodeSelector:
        kubernetes.azure.com/scalesetpriority: spot
      restartPolicy: Always
      schedulerName: default-scheduler
      securityContext: {}
      terminationGracePeriodSeconds: 30
      tolerations:
      - effect: NoSchedule
        key: kubernetes.azure.com/scalesetpriority
        operator: Equal
        value: spot
      volumes:
      - name: kafka-certs
        secret:
          secretName: kafka-certs