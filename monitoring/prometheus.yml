global:
  scrape_interval: 15s

scrape_configs:
  - job_name: 'api-gateway'
    static_configs:
      - targets: ['go-gateway:8080']

  - job_name: 'log-collector'
    static_configs:
      - targets: ['go-collector:8081']

  - job_name: 'ai-service'
    static_configs:
      - targets: ['ai-service:8000']
