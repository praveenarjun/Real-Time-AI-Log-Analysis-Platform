  batch_size: 5
  flush_interval: 2

workforce:
  http_port: 8082

database:
  dsn: "postgresql://postgres.ivljtbrvvhfrkauxxojn:raveen%2A4125@aws-1-ap-northeast-2.pooler.supabase.com:6543/postgres?sslmode=require"

